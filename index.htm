<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Ayuda IA</title>
    <style>
        :root {
            /* ==================== PALETA CRAVEAT-ADAPTADA ==================== */
            --bg: #2a1b3d;
            --panel: #1f1433;
            --card: #2a1f3f;
            --accent: #c026d3;
            --accent-light: #e879f9;
            --text: #f3e8ff;
            --text-muted: #a78bfa;
            --user-bubble: #c026d3;
            --ai-bubble: #3b2a4f;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(192, 38, 211, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(232, 121, 249, 0.06) 0%, transparent 50%);
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(31, 20, 51, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(192, 38, 211, 0.2);
        }

        /* ==================== HEADER ==================== */
        header {
            background: var(--panel);
            border-bottom: 1px solid rgba(192, 38, 211, 0.3);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-dot {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #c026d3, #e879f9);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(192, 38, 211, 0.6);
        }

        .api-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(42, 27, 61, 0.8);
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid rgba(192, 38, 211, 0.3);
        }

        .api-section input {
            background: transparent;
            border: none;
            color: var(--text);
            width: 280px;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .btn-connect {
            background: linear-gradient(90deg, #c026d3, #e879f9);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-connect:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(192, 38, 211, 0.4);
        }

        .btn-connect:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== CHAT BODY ==================== */
        .chat-container {
            flex: 1;
            background: var(--bg);
            overflow-y: auto;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .message {
            max-width: 78%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.55;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .message-ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border-bottom-left-radius: 6px;
        }

        .message-user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-header {
            font-size: 0.78rem;
            opacity: 0.75;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .typing-indicator {
            align-self: flex-start;
            background: var(--ai-bubble);
            padding: 16px 20px;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            display: none;
        }

        /* ==================== FOOTER ==================== */
        footer {
            background: var(--panel);
            border-top: 1px solid rgba(192, 38, 211, 0.3);
            padding: 1.8rem 2rem;
        }

        .input-area {
            display: flex;
            gap: 16px;
            align-items: end;
            max-width: 900px;
            margin: 0 auto;
        }

        textarea {
            flex: 1;
            background: rgba(42, 27, 61, 0.8);
            border: 1px solid rgba(192, 38, 211, 0.4);
            color: var(--text);
            border-radius: 20px;
            padding: 16px 22px;
            font-size: 1.05rem;
            resize: none;
            min-height: 58px;
            max-height: 180px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-send {
            width: 58px;
            height: 58px;
            background: linear-gradient(90deg, #c026d3, #e879f9);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(192, 38, 211, 0.3);
        }

        .btn-send:hover {
            transform: scale(1.08);
        }

        .placeholder {
            opacity: 0.6;
            font-style: italic;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ==================== HEADER ==================== -->
        <header>
            <div class="logo">
                <span class="logo-dot"></span>
                <span>Mesa de Ayuda <strong>IA</strong></span>
            </div>
            
            <div class="api-section">
                <input type="password" id="apiKeyInput" placeholder="Ingresa tu API Key (sk-...)" />
                <button class="btn-connect" id="connectBtn" onclick="connectAPI()">Conectar</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 12px; font-size: 0.95rem;">
                <div id="statusDot" style="width: 12px; height: 12px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 12px #ef4444;"></div>
                <span id="status">Desconectado</span>
            </div>
        </header>

        <!-- ==================== CHAT BODY ==================== -->
        <div class="chat-container" id="chatContainer">
            <div class="message message-ai">
                <div class="message-header">Asistente IA • ahora</div>
                <p>¡Hola! Soy tu asistente de Mesa de Ayuda. ¿En qué puedo ayudarte hoy?</p>
            </div>
            
            <div id="typingIndicator" class="typing-indicator">
                <div class="message-header">Asistente IA • escribiendo</div>
                <p>●●●</p>
            </div>
        </div>

        <!-- ==================== FOOTER ==================== -->
        <footer>
            <div class="input-area">
                <textarea id="userInput" placeholder="Escribe tu consulta aquí... (Shift + Enter para nueva línea)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <p style="text-align: center; margin-top: 14px; font-size: 0.8rem; color: var(--text-muted);">
                Powered by OpenAI • gpt-4o-mini
            </p>
        </footer>
    </div>

    <script>
        /* ==================== Módulo 1 → Estado ==================== */
        // Variables globales de estado
        let apiKey = '';
        let conversationHistory = [];

        /* ==================== Módulo 2 → RAG ==================== */
        // Base de conocimiento (se llenará más adelante)
        const knowledgeBase = [
            // Ejemplo futuro: artículos, FAQs, tickets comunes
        ];

        /* ==================== Módulo 3 → System Prompt ==================== */
        // Prompt del sistema (se usará cuando se conecte a la API)
        const SYSTEM_PROMPT = `Eres un asistente profesional y amable de Mesa de Ayuda técnica. Responde de forma clara, estructurada y útil.`;

        /* ==================== Módulo 4 → API Key ==================== */
        function saveApiKey() {
            const input = document.getElementById('apiKeyInput');
            const key = input.value.trim();
            
            if (!key.startsWith('sk-')) {
                alert('La API Key debe comenzar con "sk-"');
                return false;
            }
            
            apiKey = key;
            return true;
        }

        function connectAPI() {
            const input = document.getElementById('apiKeyInput');
            const btn = document.getElementById('connectBtn');
            
            if (saveApiKey()) {
                // Deshabilitar input y botón
                input.disabled = true;
                btn.textContent = '✓ Conectado';
                btn.disabled = true;
                
                // Actualizar estado
                document.getElementById('status').textContent = 'Conectado';
                document.getElementById('statusDot').style.background = 'var(--success)';
                document.getElementById('statusDot').style.boxShadow = '0 0 12px var(--success)';
                
                addMessage('assistant', '✅ Conexión establecida correctamente. ¿En qué puedo ayudarte?');
            }
        }

        /* ==================== Módulo 5 → Enviar mensaje ==================== */
        async function sendMessage() {
            const textarea = document.getElementById('userInput');
            const messageText = textarea.value.trim();
            
            if (messageText === '' || !apiKey) {
                if (!apiKey) alert('Por favor conecta tu API Key primero');
                return;
            }
            
            // Agregar mensaje del usuario
            addMessage('user', messageText);
            
            // Guardar en historial
            conversationHistory.push({ role: 'user', content: messageText });
            
            // Limpiar input
            textarea.value = '';
            
            // Mostrar indicador de escritura
            showTyping(true);
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        temperature: 0.3,
                        max_tokens: 600,
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            ...conversationHistory
                        ]
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const assistantReply = data.choices[0].message.content;
                
                // Guardar en historial
                conversationHistory.push({ role: 'assistant', content: assistantReply });
                
                // Mostrar respuesta
                showTyping(false);
                addMessage('assistant', assistantReply);
                
            } catch (error) {
                showTyping(false);
                console.error(error);
                addMessage('assistant', `❌ Error: ${error.message}. Verifica tu API Key y conexión.`);
            }
        }

        /* ==================== Módulo 6 → UI helpers ==================== */
        function addMessage(role, text) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${role}`;
            
            const headerText = role === 'user' ? 'Tú • ahora' : 'Asistente IA • ahora';
            
            msgDiv.innerHTML = `
                <div class="message-header">${headerText}</div>
                <p>${escapeHtml(text)}</p>
            `;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping(visible) {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = visible ? 'block' : 'none';
            if (visible) {
                const container = document.getElementById('chatContainer');
                container.scrollTop = container.scrollHeight;
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 180) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            console.log('%c✅ Mesa de Ayuda IA • Conexión OpenAI lista', 'color: #e879f9; font-weight: bold');
            
            const textarea = document.getElementById('userInput');
            
            // Auto-resize
            textarea.addEventListener('input', () => autoResize(textarea));
            
            // Key handler
            textarea.addEventListener('keydown', handleKey);
            
            // Enfocar al cargar
            setTimeout(() => {
                textarea.focus();
                autoResize(textarea);
            }, 400);
        });
    </script>
</body>
</html>
